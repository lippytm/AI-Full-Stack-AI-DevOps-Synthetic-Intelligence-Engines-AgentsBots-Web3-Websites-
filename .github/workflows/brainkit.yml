name: AI BrainKit — Autonomous Agent Checks

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  brainkit-lint-build:
    name: 🧠 BrainKit — Lint & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: ai-web3-site

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ai-web3-site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build (type-check + Next.js compile)
        run: npm run build
        env:
          # Provide a placeholder so the build doesn't fail on missing env vars
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-placeholder' }}
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID || 'placeholder' }}
